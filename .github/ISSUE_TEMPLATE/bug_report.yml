name: Bug report
description: "Something isn't working as expected"
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `ytsubs "youtube.com/watch?v=..."`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: ytsubs-version
    attributes:
      label: ytsubs version
      placeholder: "e.g. 0.2.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. v22.14.0  (run: node --version)"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "Thanks for taking the time to file this report!"
