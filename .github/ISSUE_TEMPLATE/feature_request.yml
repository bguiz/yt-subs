name: Feature request
description: Suggest an idea or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve, or what is missing?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have already tried.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - SDK
        - MCP server
        - Documentation
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: "Thanks for taking the time to file this request!"
